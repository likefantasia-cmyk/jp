<html lang="zh-TW"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d0d">
<title>語の森</title>
<link href="./index_files/css2" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0d;--s1:#141414;--s2:#1a1a1a;--s3:#222;
  --bd:#2a2a2a;--bd2:#333;
  --pk:#ffb7c5;--pk2:#ff8fab;--pk3:#ffd6e0;--pkd:#4a1a24;--pkbg:rgba(255,143,171,.08);--pkbr:rgba(255,143,171,.25);
  --tx:#f5eeef;--mu:#7a6b6e;--m2:#b09aa0;
  --gn:#4ade80;--rd:#f87171;--ye:#fbbf24;--bl:#93c5fd;
  --r:14px;--r2:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:"Noto Sans TC",sans-serif;overflow:hidden}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
input,textarea{font-family:inherit;color:var(--tx)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:99px}

/* ── 應用框架 */
#app{max-width:480px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
nav{display:flex;background:var(--s1);border-top:1px solid var(--bd);order:2;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;padding:9px 2px 11px;font-size:9px;font-weight:700;color:var(--mu);display:flex;flex-direction:column;align-items:center;gap:3px;letter-spacing:.5px}
nav button .ni{font-size:20px;line-height:1}
nav button.on{color:var(--pk)}
.view{flex:1;overflow-y:auto;display:none;flex-direction:column}.view.show{display:flex}

/* ── 首頁 */
.hero{padding:48px 24px 20px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:-40px;right:-30px;width:200px;height:200px;background:radial-gradient(circle,rgba(255,143,171,.12) 0%,transparent 70%);pointer-events:none}
.app-name{font-family:"Noto Serif JP",serif;font-size:36px;color:var(--tx);letter-spacing:2px}
.app-name em{color:var(--pk);font-style:normal}
.app-sub{font-size:12px;color:var(--mu);margin-top:6px;letter-spacing:.5px}
.hdiv{height:1px;background:linear-gradient(90deg,var(--pkbr),transparent);margin:0 24px 16px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 24px 20px}
.stat{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:14px 8px;text-align:center}
.stn{font-family:"Noto Serif JP",serif;font-size:30px;color:var(--pk)}
.stl{font-size:10px;color:var(--mu);margin-top:3px;letter-spacing:.5px}
.sh{padding:0 24px 8px;font-size:10px;color:var(--mu);letter-spacing:1.5px;font-weight:700}
.rlist{padding:0 24px 20px;display:flex;flex-direction:column;gap:8px}
.ri{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .2s}
.ri:active{border-color:var(--pk)}
.riw{font-family:"Noto Serif JP",serif;font-size:20px;flex:1;color:var(--tx)}
.riz{font-size:11px;color:var(--mu);margin-top:3px}
.rib{font-size:10px;color:var(--pk);background:var(--pkbg);border:1px solid var(--pkbr);padding:2px 8px;border-radius:20px;white-space:nowrap}

/* ── 通用 */
.awrap{flex:1;display:flex;flex-direction:column;padding:20px 24px;gap:14px;overflow-y:auto}
.slbl{font-size:10px;color:var(--mu);letter-spacing:1.5px;font-weight:700}
.bp{background:var(--pk2);color:#1a0a0e;border-radius:var(--r);padding:14px;font-size:15px;font-weight:700;width:100%}
.bp:active{opacity:.8}.bp:disabled{opacity:.3;cursor:not-allowed}
.bs{background:var(--s2);border:1px solid var(--bd2);color:var(--m2);border-radius:var(--r);padding:13px;font-size:14px;font-weight:600;width:100%}
.inp{background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r);padding:13px 16px;font-size:15px;outline:none;width:100%;color:var(--tx)}
.inp:focus{border-color:var(--pk)}
.sbox{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:28px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.spin{width:32px;height:32px;border:2px solid var(--bd2);border-top-color:var(--pk);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.smsg{font-size:13px;color:var(--m2)}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--mu);padding:40px;text-align:center;font-size:14px}

/* ── 單字卡片 */
.wcard{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:20px;display:flex;flex-direction:column;gap:10px}
.wjp{font-family:"Noto Serif JP",serif;font-size:38px;line-height:1.1;color:var(--tx)}
.wkana{font-size:16px;color:var(--pk);letter-spacing:2px}
.wpos{font-size:11px;color:var(--pk);font-weight:700;letter-spacing:.5px}
.wzh{font-size:22px;font-weight:700}
.wja{font-size:13px;color:var(--m2);line-height:1.6}
.exb{background:var(--s2);border-left:3px solid var(--pk2);border-radius:0 10px 10px 0;padding:12px 14px}
.exjp{font-family:"Noto Serif JP",serif;font-size:15px;line-height:1.7;color:var(--tx)}
.exzh{font-size:12px;color:var(--mu);margin-top:4px}
.wtags{display:flex;gap:6px;flex-wrap:wrap}
.wtag{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700;letter-spacing:.3px;border:1px solid}
.tpk{color:var(--pk);background:var(--pkbg);border-color:var(--pkbr)}
.tbl{color:var(--bl);background:rgba(147,197,253,.1);border-color:rgba(147,197,253,.25)}
.trd{color:var(--rd);background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3)}
.tgn{color:var(--gn);background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.3)}
.bsav{flex:1;background:var(--pk2);color:#1a0a0e;border-radius:var(--r);padding:12px;font-size:14px;font-weight:700}
.bsav:active{opacity:.8}
.svd{flex:1;text-align:center;color:var(--mu);font-size:13px;padding:12px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r)}
.srow{display:flex;gap:8px}
.bspk{flex:1;background:rgba(147,197,253,.08);border:1px solid rgba(147,197,253,.2);color:var(--bl);border-radius:11px;padding:10px;font-size:12px;font-weight:600}
.sprow{display:flex;gap:8px}
.tbox{background:var(--pkbg);border:1px solid var(--pkbr);border-radius:var(--r);padding:12px 14px}
.tlbl{font-size:10px;color:var(--pk);font-weight:700;letter-spacing:.5px;margin-bottom:5px}
.ttxt{font-size:13px;color:var(--tx);line-height:1.7}
.bbar{background:var(--s1);border:1px solid var(--pkbr);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:5}
.binfo{flex:1;font-size:14px;font-weight:600;color:var(--pk)}
.bsub{font-size:11px;color:var(--mu);font-weight:400}
.bbtn{background:var(--pk2);color:#1a0a0e;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:700;white-space:nowrap}
.rswrap{display:flex;flex-direction:column;gap:12px}

/* ── 單字庫 */
.ltb{padding:16px 24px 8px;display:flex;gap:10px}
.srch{flex:1;background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r);padding:10px 14px;font-size:14px;outline:none;color:var(--tx)}
.srch:focus{border-color:var(--pk)}
.lcnt{font-size:11px;color:var(--mu);padding:0 24px 8px}
.llist{flex:1;overflow-y:auto;padding:0 24px 24px;display:flex;flex-direction:column;gap:6px}
.li{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .2s}
.li:active{border-color:var(--pk)}
.liw{font-family:"Noto Serif JP",serif;font-size:20px;color:var(--tx)}
.lii{font-size:11px;color:var(--mu);margin-top:2px}
.lact{display:flex;gap:4px}
.bdel{font-size:15px;color:var(--rd);padding:4px 6px}
.bspks{font-size:18px;padding:4px 6px}
.lsrs{font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid}

/* ── 測驗 */
.qwrap{flex:1;display:flex;flex-direction:column;padding:20px 24px 32px;gap:12px;overflow-y:auto}
.qprog{height:3px;background:var(--bd);border-radius:99px;overflow:hidden}
.qfill{height:100%;background:linear-gradient(90deg,var(--pk2),var(--pk3));border-radius:99px;transition:width .4s}
.qcard{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:22px}
.qlbl{font-size:10px;color:var(--mu);letter-spacing:1.5px;margin-bottom:10px;font-weight:700}
.qword{font-family:"Noto Serif JP",serif;font-size:36px;line-height:1.2}
.qsub{font-size:14px;color:var(--pk);margin-top:6px;letter-spacing:1px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r);padding:13px 16px;text-align:left;display:flex;flex-direction:column;gap:0;transition:border-color .15s}
.opt:active{transform:scale(.98)}
.opt.ok{background:rgba(74,222,128,.1);border-color:var(--gn)}
.opt.ok .opt-main{color:var(--gn);font-weight:700}
.opt.no{background:rgba(248,113,113,.1);border-color:var(--rd)}
.opt.no .opt-main{color:var(--rd);font-weight:700}
.opt-main{font-size:15px;font-weight:600;color:var(--tx);line-height:1.3}
.opt-sub{font-size:11px;color:var(--mu);margin-top:3px;line-height:1.4;display:none}
.opt.ok .opt-sub,.opt.no .opt-sub,.opt.revealed .opt-sub{display:block}
.bnq{background:var(--pk2);color:#1a0a0e;border-radius:var(--r);padding:14px;font-size:15px;font-weight:700;width:100%}
.score{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;gap:14px}
.scn{font-family:"Noto Serif JP",serif;font-size:56px;color:var(--pk)}
.brt{background:var(--pk2);color:#1a0a0e;border-radius:var(--r);padding:13px 40px;font-size:15px;font-weight:700;margin-top:8px}
.sched{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:14px 20px;width:100%;text-align:left}

/* ── 模態視窗 */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:flex-end;max-width:480px;margin:0 auto}
.modal{background:var(--s1);border-radius:24px 24px 0 0;width:100%;max-height:90dvh;display:flex;flex-direction:column;overflow:hidden}
.mnav{background:var(--s1);border-bottom:1px solid var(--bd);padding:14px 20px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;border-radius:24px 24px 0 0}
.mbody-scroll{flex:1;overflow-y:auto;padding:16px 24px 32px;display:flex;flex-direction:column;gap:14px}
.mword{font-family:"Noto Serif JP",serif;font-size:38px;line-height:1.2}
.mclose{background:var(--s2);border:1px solid var(--bd2);color:var(--m2);border-radius:var(--r);padding:12px;font-size:14px;font-weight:600;width:100%;margin-top:8px}

/* ── 文章區 */
.awrap .url-row{display:flex;gap:8px}
.acard{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:18px;display:flex;flex-direction:column;gap:12px}
.acard-title{font-size:11px;color:var(--pk);font-weight:700;letter-spacing:1px}
.gram-item{background:var(--s2);border-radius:var(--r);padding:12px 14px}
.gram-title{font-size:14px;font-weight:700;color:var(--tx);margin-bottom:4px}
.gram-exp{font-size:12px;color:var(--m2);line-height:1.6}
.gram-ex{font-size:12px;color:var(--mu);font-style:italic;margin-top:4px;border-left:2px solid var(--pkbr);padding-left:8px}
.word-chip{display:inline-flex;flex-direction:column;background:var(--s2);border:1px solid var(--bd2);border-radius:10px;padding:8px 12px;cursor:pointer;transition:border-color .2s;gap:2px}
.word-chip:hover{border-color:var(--pk)}
.word-chip.added{border-color:var(--gn);background:rgba(74,222,128,.08)}
.chip-jp{font-family:"Noto Serif JP",serif;font-size:17px}
.chip-kana{font-size:10px;color:var(--pk);letter-spacing:1px}
.chip-zh{font-size:11px;color:var(--mu)}
.chips-wrap{display:flex;flex-wrap:wrap;gap:8px}
.add-all-btn{background:var(--s2);border:1px solid var(--pkbr);color:var(--pk);border-radius:var(--r);padding:10px;font-size:13px;font-weight:700;width:100%}
.add-all-btn:active{background:var(--pkbg)}

/* ── SRS 級別顏色 */
.lv0{color:var(--mu);border-color:var(--bd2)}
.lv1{color:#fbbf24;border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.08)}
.lv2{color:#34d399;border-color:rgba(52,211,153,.4);background:rgba(52,211,153,.08)}
.lv3{color:#60a5fa;border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.08)}
.lv4{color:#c084fc;border-color:rgba(192,132,252,.4);background:rgba(192,132,252,.08)}
.lv5{color:var(--pk);border-color:var(--pkbr);background:var(--pkbg)}

/* ── 新增單字手動輸入 */
.manual-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.manual-grid .inp-wrap{display:flex;flex-direction:column;gap:4px}
.inp-lbl{font-size:10px;color:var(--mu);letter-spacing:.5px;font-weight:700;padding-left:2px}
.inp-full{grid-column:1/-1}
.ex-row{display:flex;flex-direction:column;gap:8px;background:var(--s2);border-radius:var(--r);padding:12px}
.ex-row-title{font-size:10px;color:var(--mu);letter-spacing:1px;font-weight:700}

/* ── Toast */
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--bd2);padding:10px 20px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;max-width:320px;text-align:center;white-space:pre-line}
.toast.show{opacity:1}

/* ── Sakura 裝飾 */
.sakura-deco{position:absolute;pointer-events:none;opacity:.35;font-size:18px}

/* ── API key 設定 */
.apib{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:22px;display:flex;flex-direction:column;gap:12px}
.apil{font-size:13px;color:var(--m2);line-height:1.7}
.apii{background:var(--s2);border:1px solid var(--bd2);border-radius:var(--r);padding:12px 14px;font-size:14px;outline:none;width:100%;color:var(--tx);font-family:"Noto Sans TC",sans-serif}
.apii:focus{border-color:var(--pk)}

/* ── 測驗設定 */
.qsetup-card{background:var(--s1);border:2px solid var(--bd);border-radius:var(--r2);padding:18px;cursor:pointer;transition:border-color .2s}
.qsetup-card:hover,.qsetup-card:active{border-color:var(--pkbr)}
.qsetup-title{font-size:16px;font-weight:700;color:var(--pk);margin:8px 0 4px}
.qsetup-desc{font-size:12px;color:var(--mu);line-height:1.6}
</style>
</head>
<body>

  <!-- 首頁 -->

<!-- 模態視窗 -->
<div class="mbg" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal"><div id="mbody" style="display:flex;flex-direction:column;overflow:hidden;max-height:90dvh"></div></div>

<script>
// ══════════════════════════════════════════
// 資料層
// ══════════════════════════════════════════
var LIB = [];
var ST = {quiz:0, today:0, date:""};
var PEND = [];
var QST = {qs:[], idx:0, sc:0, ans:false, wrong:[]};

function lsGet(k){try{return JSON.parse(localStorage.getItem(k)||"null");}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function saveAll(){lsSet("nf-lib",LIB);lsSet("nf-st",ST);}
function loadAll(){
  var l=lsGet("nf-lib");if(Array.isArray(l))LIB=l;
  var s=lsGet("nf-st");if(s)ST=s;
}

function getKey(){return lsGet("nf-key")||"";}
function saveKey(k){lsSet("nf-key",k);}

function chkDay(){
  var today=new Date().toDateString();
  if(ST.date!==today){ST.today=0;ST.date=today;}
}

// ══════════════════════════════════════════
// SRS（SM-2 簡化版）
// ══════════════════════════════════════════
var SRS_MAP = {};
function getSRS(w){
  var id = w.word;
  if(!SRS_MAP[id])SRS_MAP[id]={level:0,due:0,skip:false};
  return SRS_MAP[id];
}
function setSRS(word, ok){
  var s = getSRS({word:word});
  var intervals=[0,1,3,7,14,30];
  if(ok){
    s.level=Math.min(5,s.level+1);
  } else {
    s.level=Math.max(0,s.level-2);
  }
  s.due = Date.now()+(intervals[s.level]||0)*86400000;
  lsSet("nf-srs",SRS_MAP);
}
function loadSRS(){var m=lsGet("nf-srs");if(m)SRS_MAP=m;}

// ══════════════════════════════════════════
// AI API（Anthropic）
// ══════════════════════════════════════════
async function callAI(messages, sysPrompt){
  var key = getKey();
  if(!key) throw new Error("請先設定 API Key");
  var body = {
    model:"claude-sonnet-4-20250514",
    max_tokens:1000,
    system: sysPrompt||"你是日語教學專家。只輸出 JSON，不要任何 markdown 或解釋文字。",
    messages: messages
  };
  var res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });
  var data = await res.json();
  if(!res.ok) throw new Error(data.error?.message||"API 錯誤");
  var text = data.content.filter(function(c){return c.type==="text";}).map(function(c){return c.text;}).join("");
  return text;
}

function parseJSON(raw){
  var s = raw.trim();
  var fence="```";
  s = s.split(fence+"json").join("").split(fence).join("").trim();
  var i1=s.indexOf("{"), i2=s.indexOf("[");
  if(i2>=0&&(i1<0||i2<i1))s=s.slice(i2);
  else if(i1>=0)s=s.slice(i1);
  return JSON.parse(s);
}

function doWord(){
  var inp=document.getElementById("wi").value.trim();if(!inp)return;
  var ws=inp.split(/[\s,，、]+/).map(function(w){return w.trim();}).filter(Boolean);
  var btn=document.getElementById("biw");btn.disabled=true;btn.textContent="⏳ 分析中...";
  var ra=document.getElementById("ra");ra.innerHTML="";
  setLoad("分析 "+ws.length+" 個單字中...");

  var CHUNK=6;var chunks=[];
  for(var i=0;i<ws.length;i+=CHUNK)chunks.push(ws.slice(i,i+CHUNK));
  var allWords=[];

  function next(idx){
    if(idx>=chunks.length){showRes(allWords,"AI分析");btn.disabled=false;btn.textContent="🤖 AI 分析單字";return;}
    var chunk=chunks[idx];
    var p=chunk.length===1?wprompt(chunk[0]):bprompt(chunk);
    setLoad("第"+(idx+1)+"/"+chunks.length+"批："+chunk.join("、"));
    callAI([{role:"user",content:p}])
      .then(function(raw){
        var d=parseJSON(raw);
        var arr=Array.isArray(d)?d:[d];
        allWords=allWords.concat(arr);
        next(idx+1);
      })
      .catch(function(e){
        ra.innerHTML="";ra.appendChild(errBox(e.message));
        btn.disabled=false;btn.textContent="🤖 AI 分析單字";
      });
  }
  next(0);
}

function getPool(){
  var now=Date.now();
  var due=LIB.filter(function(w){return!getSRS(w).skip&&getSRS(w).due<=now;});
  var fresh=LIB.filter(function(w){var s=getSRS(w);return!s.skip&&s.level===0&&s.due>now;});
  var rest=LIB.filter(function(w){var s=getSRS(w);return!s.skip&&s.level>0&&s.due>now;});
  var pool=shuffle(due).concat(shuffle(fresh)).concat(shuffle(rest));
  return pool.slice(0,Math.min(15,pool.length));
}

function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

function makeQ(w, pool){
  if(!w||!w.zh)return null;
  var t=Math.random()<0.5?"jp2zh":"zh2jp";
  if(LIB.length<4)return null;
  var others=shuffle(pool.filter(function(x){return x.word!==w.word&&x.zh&&x.zh!==w.zh;})).slice(0,3);
  if(others.length<3)others=shuffle(LIB.filter(function(x){return x.word!==w.word&&x.zh&&x.zh!==w.zh;})).slice(0,3);
  if(others.length<3)return null;
  var correct,opts;
  if(t==="jp2zh"){
    correct=w.zh;
    opts=shuffle([correct].concat(others.map(function(x){return x.zh;})));
    return{type:"jp2zh",word:w.word,prompt:w.word,sub:w.kana||"",q:"這個日文單字的意思是？",opts:opts,correct:correct};
  } else {
    correct=w.word;
    opts=shuffle([correct].concat(others.map(function(x){return x.word;})));
    return{type:"zh2jp",word:w.word,prompt:w.zh,sub:"",q:"對應的日文單字是？",opts:opts,correct:correct};
  }
}

function ansQ(btn, chosen, q){
  if(QST.ans)return;QST.ans=true;
  document.querySelectorAll(".opt").forEach(function(b){b.disabled=true;});
  var ok=chosen===q.correct;
  if(ok){btn.classList.add("ok");QST.sc++;}
  else{
    btn.classList.add("no");
    document.querySelectorAll(".opt").forEach(function(b){
      var m=b.querySelector(".opt-main");
      if(m&&m.textContent.trim()===q.correct)b.classList.add("ok");
    });
    QST.wrong.push(q.word);
  }
  setSRS(q.word,ok);
  if(q.type==="jp2zh"||q.type==="ai_fill")speak(q.word);

  // 揭曉提示
  document.querySelectorAll(".opt").forEach(function(b){
    var m=b.querySelector(".opt-main");
    var s=b.querySelector(".opt-sub");
    if(!m||!s)return;
    var opt=m.textContent.trim();
    var hint="";
    if(q.type==="jp2zh"){
      var match=LIB.find(function(x){return x.zh===opt;});if(match)hint=match.word+(match.kana?"（"+match.kana+"）":"");
    } else if(q.type==="zh2jp"){
      var match2=LIB.find(function(x){return x.word===opt;});if(match2)hint=match2.zh;
    }
    s.textContent=hint;
    if(!b.classList.contains("ok")&&!b.classList.contains("no"))b.classList.add("revealed");
  });

  var wObj=LIB.find(function(x){return x.word===q.word;})||{};
  var fb=document.getElementById("qfb");fb.innerHTML="";fb.style.display="block";

  var header=mk("div","");
  header.style.cssText="padding:12px 14px;border-radius:12px;margin-bottom:10px;display:flex;align-items:center;gap:8px;"
    +(ok?"background:rgba(74,222,128,.1);border:1px solid var(--gn)":"background:rgba(248,113,113,.1);border:1px solid var(--rd)");
  var icon=mk("span","");icon.style.fontSize="20px";icon.textContent=ok?"✅":"❌";
  var htxt=mk("div","");
  var lv=getSRS({word:q.word}).level;
  var htitle=mk("div","");htitle.style.cssText="font-size:13px;font-weight:700;color:"+(ok?"var(--gn)":"var(--rd)");
  htitle.textContent=ok?"答對！熟悉度 +1（Lv."+lv+"）":"答錯！熟悉度 -2（Lv."+lv+"）";
  htxt.appendChild(htitle);
  if(!ok){var hcor=mk("div","");hcor.style.cssText="font-size:12px;color:var(--m2);margin-top:3px";hcor.textContent="正確答案："+q.correct;htxt.appendChild(hcor);}
  header.appendChild(icon);header.appendChild(htxt);fb.appendChild(header);

  if(wObj.word){
    var ic=mk("div","wcard");ic.style.gap="8px";
    ic.appendChild(mk("div","wjp",wObj.word));
    if(wObj.kana)ic.appendChild(mk("div","wkana",wObj.kana));
    ic.appendChild(mk(  "div","wzh",wObj.zh));
    if(wObj.example_jp){var eb=mk("div","exb");eb.appendChild(mk("div","exjp",wObj.example_jp));eb.appendChild(mk("div","exzh",wObj.example_zh||""));ic.appendChild(eb);}
    if(wObj.memory_tip){var mb3=mk("div","tbox");mb3.appendChild(mk("div","tlbl","💡 記憶技巧"));mb3.appendChild(mk("div","ttxt",wObj.memory_tip));ic.appendChild(mb3);}
    fb.appendChild(ic);
  }
  document.getElementById("qnxt").style.display="block";
}

async function fetchArticleUrl(){
  var url=(document.getElementById("art-url").value||"").trim();
  if(!url){toast("請輸入網址");return;}
  var ra=document.getElementById("art-ra");ra.innerHTML="";
  var b=mk("div","sbox");b.appendChild(mk("div","spin"));b.appendChild(mk("div","smsg","擷取文章中..."));ra.appendChild(b);
  try{
    // 用 CORS proxy 抓取頁面文字
    var proxyUrl="https://api.allorigins.win/get?url="+encodeURIComponent(url);
    var res=await fetch(proxyUrl);
    var data=await res.json();
    var parser=new DOMParser();
    var doc=parser.parseFromString(data.contents,"text/html");
    // 取正文
    var body=doc.body;
    var scripts=body.querySelectorAll("script,style,nav,header,footer");
    scripts.forEach(function(s){s.remove();});
    var text=(body.innerText||body.textContent||"").replace(/\s+/g," ").trim().slice(0,3000);
    if(!text){throw new Error("無法擷取文章內容，請直接貼文字");}
    document.getElementById("art-text").value=text;
    analyzeArticle();
  }catch(e){
    ra.innerHTML="";
    var err=mk("div","apib");err.appendChild(mk("div","apil","❌ "+e.message+"\n\n請直接將文章文字貼到下方輸入框。"));ra.appendChild(err);
  }
}

  // 單字
  if(d.words&&d.words.length){

    var newN=d.words.filter(function(w){return!LIB.some(function(l){return l.word===w.word;});}).length;

    wrap.appendChild(wc);
  }
  ra.appendChild(wrap);
}

// ══════════════════════════════════════════
// 工具
// ══════════════════════════════════════════
function mk(tag,cls,txt){
  var e=document.createElement(tag);
  if(cls)e.className=cls;
  if(txt!=null)e.textContent=txt;
  return e;
}

var _toastTimer=null;
function toast(msg,dur){
  var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  if(_toastTimer)clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){t.classList.remove("show");},dur||2500);
}

function speak(text){
  if(!window.speechSynthesis)return;
  var u=new SpeechSynthesisUtterance(text);u.lang="ja-JP";u.rate=0.9;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}

function errBox(msg){
  var b=mk("div","apib");b.appendChild(mk("div","apil","❌ "+msg));return b;
}

loadAll();loadSRS();
showView("home");
